name: Auto Release on Merge to Main

on:
  push:
    branches:
      - main

jobs:
  release:
    name: Create Tag & Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # 1. Checkout du code
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Lecture de la version depuis manifest.json
      - name: Read version from manifest.json
        id: version
        run: |
          # Lit le champ package_version directement depuis le manifest.json
          VERSION=$(jq -r '.package_version' manifest.json)
          TAG="v${VERSION}"

          echo "Version found in manifest.json: $VERSION"
          echo "Tag: $TAG"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      # 3. Vérifie que ce tag n'existe pas déjà
      - name: Check tag does not already exist
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists — skipping release."
            exit 1
          fi

      # 4. Création du TAG
      - name: Create Git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      # 5. Création du ZIP (sans .git et .github)
      - name: Package ZIP
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          TAG="${{ steps.version.outputs.tag }}"
          ZIP_NAME="${REPO_NAME}-${TAG}.zip"

          zip -r "$ZIP_NAME" . \
            --exclude "*.git/*" \
            --exclude "*.github/*"

          echo "ZIP created: $ZIP_NAME"
          echo "zip_name=$ZIP_NAME" >> "$GITHUB_ENV"

      # 6. Création de la GitHub Release avec le ZIP en asset
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Release ${{ steps.version.outputs.tag }}"
          body: |
            ## Lies of P — PopTracker Pack ${{ steps.version.outputs.tag }}

            Automatic release generated on merge to `main`.

            ### Installation
            1. Download the ZIP below
            2. Extract it into your PopTracker `packs` folder
            3. Open PopTracker and load the pack
          files: ${{ env.zip_name }}
          draft: false
          prerelease: false
